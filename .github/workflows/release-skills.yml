name: Package and Release Skills

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Zip each skill folder
        run: |
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              skill_name="${dir%/}"
              zip -r "${skill_name}.zip" "$dir"
              echo "Zipped: ${skill_name}.zip"
            fi
          done

      - name: Delete existing latest release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with skill zips
        run: |
          gh release create latest *.zip \
            --title "Latest Skills" \
            --notes "Auto-generated on every push to main. Download individual skill zips below." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
